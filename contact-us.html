<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | Sundgren Realty &amp; Auction | El Dorado, KS</title>
  <meta name="description" content="Contact Sundgren Realty &amp; Auction in El Dorado, KS. Call (316) 321-7112 or email realty@sundgren.com. 218 E Central Ave, El Dorado, KS 67042.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="canonical" href="https://sundgrenrealty.com/contact-us/">
  <meta property="og:title" content="Contact Us | Sundgren Realty &amp; Auction | El Dorado, KS">
  <meta property="og:description" content="Contact Sundgren Realty. Call (316) 321-7112 or email realty@sundgren.com.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://sundgrenrealty.com/contact-us/">
  <meta name="twitter:card" content="summary_large_image">
  <!-- SCHEMA:LocalBusiness -->
  <!-- SCHEMA:BreadcrumbList -->
  <!-- MAP:EMBED -->
  <link rel="icon" href="/images/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous">
  <link rel="stylesheet" href="/css/sundgren.css">
</head>
<body>

<!-- HEADER -->

<main>

  <section class="page-hero">
    <div class="inner">
      <h1>Contact Us</h1>
      <nav aria-label="Breadcrumb">
        <ol class="breadcrumb">
          <li><a href="/">Home</a></li>
          <li class="active">Contact Us</li>
        </ol>
      </nav>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div class="contact-grid">

        <!-- Contact Info -->
        <div>
          <div class="contact-info-block">
            <h2>Get in Touch</h2>
            <div class="contact-item">
              <div class="contact-icon"><i class="fas fa-phone"></i></div>
              <div class="contact-detail">
                <strong>Office Phone</strong>
                <span><a href="tel:3163217112">(316) 321-7112</a></span>
              </div>
            </div>
            <div class="contact-item">
              <div class="contact-icon"><i class="fas fa-fax"></i></div>
              <div class="contact-detail">
                <strong>Fax</strong>
                <span>(316) 321-7116</span>
              </div>
            </div>
            <div class="contact-item">
              <div class="contact-icon"><i class="fas fa-envelope"></i></div>
              <div class="contact-detail">
                <strong>Email</strong>
                <span><a href="mailto:realty@sundgren.com">realty@sundgren.com</a></span>
              </div>
            </div>
            <div class="contact-item">
              <div class="contact-icon"><i class="fas fa-map-marker-alt"></i></div>
              <div class="contact-detail">
                <strong>Address</strong>
                <span itemprop="address" itemscope itemtype="https://schema.org/PostalAddress">
                  <span itemprop="streetAddress">218 E Central Ave</span><br>
                  <span itemprop="addressLocality">El Dorado</span>, <span itemprop="addressRegion">KS</span> <span itemprop="postalCode">67042</span>
                </span>
              </div>
            </div>
          </div>

          <!-- Map -->
          <div style="margin-top:24px;border-radius:6px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.1);">
            <iframe
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3142.5!2d-96.8607!3d37.8201!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x87be6d6a9f2d0001%3A0x1!2s218+E+Central+Ave%2C+El+Dorado%2C+KS+67042!5e0!3m2!1sen!2sus!4v1690000000000"
              width="100%"
              height="280"
              style="border:none;display:block;"
              loading="lazy"
              allowfullscreen
              referrerpolicy="no-referrer-when-downgrade"
              title="Sundgren Realty office location map">
            </iframe>
          </div>
        </div>

        <!-- Contact Form -->
        <div class="contact-form">
          <h2>Send Us a Message</h2>
          <form id="contact-form" action="/submit" method="POST">
            <div class="form-row">
              <div class="form-group">
                <label for="name">Full Name *</label>
                <input type="text" id="name" name="name" required placeholder="Your name">
              </div>
              <div class="form-group">
                <label for="phone">Phone</label>
                <input type="tel" id="phone" name="phone" placeholder="(316) 000-0000">
              </div>
            </div>
            <div class="form-group">
              <label for="email">Email Address *</label>
              <input type="email" id="email" name="email" required placeholder="your@email.com">
            </div>
            <div class="form-group">
              <label for="interest">I&#39;m Interested In</label>
              <select id="interest" name="interest">
                <option value="">Select an option</option>
                <option value="buying">Buying Property</option>
                <option value="selling">Selling Property</option>
                <option value="auction">Auction Services</option>
                <option value="appraisal">Appraisal</option>
                <option value="other">Other</option>
              </select>
            </div>
            <div class="form-group">
              <label for="message">Message *</label>
              <textarea id="message" name="message" required placeholder="Tell us about your property needs..."></textarea>
            </div>
            <!-- Cloudflare Turnstile -->
            <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
            <div class="cf-turnstile" data-sitekey="1x00000000000000000000AA" style="margin-bottom:16px;"></div>
            <button type="submit" class="btn-primary" style="width:100%;padding:14px;font-size:16px;">Send Message <i class="fas fa-paper-plane" style="margin-left:8px;"></i></button>
          </form>
          <div id="form-success" style="display:none;background:#f0fdf4;border:1px solid #16a34a;border-radius:6px;padding:20px;margin-top:16px;text-align:center;">
            <i class="fas fa-check-circle" style="color:#16a34a;font-size:24px;margin-bottom:8px;display:block;"></i>
            <strong>Message sent!</strong> We&#39;ll be in touch shortly.
          </div>
          <div id="form-error" style="display:none;background:#fef2f2;border:1px solid #dc2626;border-radius:6px;padding:20px;margin-top:16px;text-align:center;">
            <i class="fas fa-exclamation-circle" style="color:#dc2626;font-size:24px;margin-bottom:8px;display:block;"></i>
            <strong>Something went wrong.</strong> Please try again or call us directly.
          </div>
        </div>

      </div>
    </div>
  </section>

</main>

<!-- FOOTER -->

<script>
document.getElementById('contact-form').addEventListener('submit', function(e) {
  e.preventDefault();
  var btn = this.querySelector('button[type=submit]');
  btn.disabled = true;
  btn.textContent = 'Sending...';
  var formData = new FormData(this);
  fetch('/submit', { method: 'POST', body: formData })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.ok) {
        document.getElementById('contact-form').style.display = 'none';
        document.getElementById('form-success').style.display = 'block';
      } else {
        document.getElementById('form-error').style.display = 'block';
        btn.disabled = false;
        btn.innerHTML = 'Send Message <i class="fas fa-paper-plane" style="margin-left:8px;"></i>';
        if (window.turnstile) window.turnstile.reset();
      }
    })
    .catch(function() {
      document.getElementById('form-error').style.display = 'block';
      btn.disabled = false;
      btn.innerHTML = 'Send Message <i class="fas fa-paper-plane" style="margin-left:8px;"></i>';
      if (window.turnstile) window.turnstile.reset();
    });
});
</script>

</body>
</html>
